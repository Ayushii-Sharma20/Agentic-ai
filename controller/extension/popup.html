<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>AI Terms Analyzer</title>

<style>

body{
    font-family: Arial, sans-serif;
    width:320px;
    padding:15px;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
}

h2{
    text-align:center;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:white;
    color:#0077ff;
    font-weight:bold;
    cursor:pointer;
    font-size:14px;
}

button:hover{
    background:#f2f2f2;
}

#result{
    margin-top:15px;
    background:white;
    color:black;
    padding:12px;
    border-radius:8px;
    font-size:13px;
    max-height:250px;
    overflow:auto;
}

#summary{
    margin-bottom:10px;
}

#risk{
    font-weight:bold;
    margin-bottom:10px;
}

#clauses{
    margin-top:8px;
    font-size:13px;
}

</style>

</head>

<body>

<h2>AI Terms Analyzer</h2>

<button id="analyzeBtn">Analyze Website</button>

<div id="result">

<p id="summary">Summary will appear here...</p>
<p id="recommendation"></p>
<p id="risk">Risk: --</p>

<div id="clauses"></div>


</div>

<script src="popup.js"></script>

</body>

</html>
